<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} — Techbroker</title>
<meta name="description" content="{{ .Description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0b0f;
  --bg-secondary: #111318;
  --bg-card: #161820;
  --bg-card-hover: #1c1e28;
  --text-primary: #e8e6e1;
  --text-secondary: #8a8994;
  --text-muted: #5c5b66;
  --accent: #00e5a0;
  --accent-dim: #00e5a020;
  --border: #ffffff0a;
  --border-hover: #ffffff15;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }
a:hover { opacity: 0.8; }

.container { max-width: 800px; margin: 0 auto; padding: 6rem 2rem; }

.back-link {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  margin-bottom: 1rem;
}

.subtitle {
  font-size: 1.05rem;
  font-weight: 300;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 3rem;
}

.article-list { display: flex; flex-direction: column; gap: 1.5rem; }

.article-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  transition: all 0.3s;
  display: block;
  color: var(--text-primary);
}

.article-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  opacity: 1;
}

.article-card .tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  display: block;
}

.article-card h2 {
  font-family: var(--font-body);
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.article-card p {
  font-size: 0.88rem;
  font-weight: 300;
  color: var(--text-secondary);
  line-height: 1.6;
}

.article-card .date {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 1rem;
}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">← techbroker.ca</a>
  <h1>{{ .Title }}</h1>
  <p class="subtitle">{{ .Description }}</p>

  <div class="article-list">
    {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .Permalink }}" class="article-card">
      {{ with .Params.tag }}<span class="tag">{{ . }}</span>{{ end }}
      <h2>{{ .Title }}</h2>
      <p>{{ .Description }}</p>
      <span class="date">{{ .Date.Format "2 January 2006" }}</span>
    </a>
    {{ end }}
  </div>
</div>
</body>
</html>
