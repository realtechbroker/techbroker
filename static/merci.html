<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Techbroker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: #0a0b0f;
  color: #e8e6e1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.container { max-width: 500px; }
.check {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #00e5a020;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  color: #00e5a0;
  margin-bottom: 2rem;
}
h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 2.5rem;
  font-weight: 400;
  margin-bottom: 1rem;
}
p {
  font-size: 1.05rem;
  font-weight: 300;
  color: #8a8994;
  line-height: 1.7;
  margin-bottom: 2rem;
}
a {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.8rem 1.8rem;
  border: 1px solid #ffffff15;
  border-radius: 6px;
  color: #8a8994;
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.3s;
}
a:hover { color: #e8e6e1; border-color: #8a8994; }
</style>
</head>
<body>
<div class="container">
  <div class="check">✓</div>
  <h1>Merci!</h1>
  <p>Votre demande a bien été envoyée. Guillaume vous revient dans les 24 heures pour planifier votre consultation gratuite.</p>
  <a href="/">← Retour à techbroker.ca</a>
</div>
</body>
</html>
